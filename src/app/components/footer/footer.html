<footer class="footer">
  <div class="container">
    <div class="footer-top">
      <div class="footer-brand">
        <h2 class="footer-logo" (click)="scrollToSection('hero')">
          <span class="text-gradient">Portfolio.</span>
        </h2>
        <p class="footer-tagline">Building the future of the web, one pixel at a time.</p>
      </div>

      <div class="footer-socials">
        <a *ngFor="let link of socialLinks" [href]="link.url" target="_blank" class="social-link">
          {{ link.name }}
        </a>
      </div>
    </div>

    <div class="footer-bottom">
      <div class="footer-nav">
        <a (click)="scrollToSection('hero')">Home</a>
        <a (click)="scrollToSection('about')">About</a>
        <a (click)="scrollToSection('projects')">Projects</a>
        <a (click)="scrollToSection('contact')">Contact</a>
      </div>
      <p class="copyright">&copy; {{ currentYear }} Muhammad Ahmad. All rights reserved.</p>
    </div>
  </div>
</footer>
