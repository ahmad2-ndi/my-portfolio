<section id="contact" class="contact-section">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title text-center">Get in <span class="text-gradient">Touch</span></h2>
      <p class="section-subtitle text-center">Have a project in mind or just want to say hi? I'd love to hear from you!</p>
    </div>

    <div class="contact-grid">
      <!-- Contact Details -->
      <div class="contact-info">
        <div class="info-card glass-card" *ngFor="let info of contactInfo">
          <div class="info-icon">
            <span class="material-icons">{{ info.icon }}</span>
          </div>
          <div class="info-text">
            <h4 class="info-label">{{ info.label }}</h4>
            <p class="info-value">{{ info.value }}</p>
          </div>
        </div>
      </div>

      <!-- Contact Form -->
      <div class="contact-form-container glass-card">
        <form #contactForm="ngForm" (ngSubmit)="onSubmit()">
          <div class="form-row">
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" [(ngModel)]="formData.name" required placeholder="Your Name" />
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" [(ngModel)]="formData.email" required placeholder="Your Email" />
            </div>
          </div>
          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" [(ngModel)]="formData.subject" required placeholder="Project Subject" />
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" [(ngModel)]="formData.message" rows="5" required placeholder="Your Message"></textarea>
          </div>
          <button type="submit" class="btn-premium" [disabled]="!contactForm.form.valid">
            Send Message
          </button>
        </form>
      </div>
    </div>
  </div>
</section>
