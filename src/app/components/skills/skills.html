<section id="skills" class="skills-section">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title text-center">My <span class="text-gradient">Expertise</span></h2>
      <p class="section-subtitle text-center">A comprehensive look at the tools and technologies I use to bring ideas to life.</p>
    </div>

    <div class="skills-grid">
      <div class="skill-category glass-card" *ngFor="let category of skillCategories">
        <h3 class="category-name">{{ category.name }}</h3>
        <div class="skill-list">
          <div class="skill-item" *ngFor="let skill of category.skills">
            <div class="skill-info">
              <span class="skill-name">{{ skill.name }}</span>
              <span class="skill-percentage">{{ skill.level }}%</span>
            </div>
            <div class="skill-bar-container">
              <div class="skill-bar" [style.width.%]="skill.level"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
