<section class="hero-section">
  <!-- Three.js Canvas Container -->
  <div #canvasContainer class="canvas-container"></div>

  <!-- Content Layer -->
  <div class="container hero-content">
    <div class="content-wrapper">
      <span class="hero-label fade-in">Creative Developer & Designer</span>
      <h1 class="hero-title fade-in">
        I'm <span class="text-gradient">Muhammad Ahmad</span> <br />
        A 3D Experience Developer.
      </h1>
      <p class="hero-description fade-in">
        Crafting immersive digital journeys with high-performance code and stunning aesthetics.
      </p>
      
      <div class="hero-actions fade-in">
        <button class="btn-premium" (click)="scrollToSection('projects')">
          View Projects
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="btn-premium btn-outline" (click)="scrollToSection('contact')">Let's Talk</button>
      </div>
    </div>
  </div>

  <!-- Scroll Indicator -->
  <div class="scroll-indicator">
    <div class="mouse">
      <div class="wheel"></div>
    </div>
  </div>
</section>
